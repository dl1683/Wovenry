{% if suggested %}
<p class="text-xs text-green-700 bg-green-50 p-2 rounded-lg">
    AI suggested: {% for cat in suggested %}{{ cat.name }}{% if not forloop.last %}, {% endif %}{% endfor %}
</p>
<script>
    (function() {
        var ids = [{% for cat in suggested %}{{ cat.pk }}{% if not forloop.last %}, {% endif %}{% endfor %}];
        document.querySelectorAll('#category-checkboxes input[type="checkbox"]').forEach(function(cb) {
            cb.checked = ids.includes(parseInt(cb.value));
        });
    })();
</script>
{% else %}
<p class="text-xs text-amber-600 bg-amber-50 p-2 rounded-lg">Could not generate suggestions. Select manually.</p>
{% endif %}
