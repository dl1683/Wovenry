<div class="fixed inset-0 bg-black/40 z-40 flex items-center justify-center"
     onclick="if(event.target===this)document.getElementById('modal-container').innerHTML=''">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6 relative" onclick="event.stopPropagation()">
        <button onclick="document.getElementById('modal-container').innerHTML=''"
            class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>

        <h2 class="text-lg font-semibold text-gray-900 mb-5">Add Metaprompt to Project</h2>

        <a href="{% url 'metaprompt-create' %}?project={{ project.pk }}"
           class="flex items-center justify-center gap-2 w-full bg-brand-600 text-white text-center py-2.5 px-4 rounded-lg hover:bg-brand-700 font-medium text-sm transition mb-5">
            Create New Metaprompt
        </a>

        {% if available %}
        <div class="border-t pt-5">
            <p class="text-sm font-medium text-gray-700 mb-3">Or add an existing metaprompt:</p>
            <form method="post" action="{% url 'project-add-metaprompt' pk=project.pk %}">
                {% csrf_token %}
                <div class="space-y-2 max-h-64 overflow-y-auto mb-4 pr-1">
                    {% for mp in available %}
                    <label class="flex items-start gap-3 p-3 rounded-lg border border-gray-200 hover:bg-gray-50 cursor-pointer">
                        <input type="radio" name="metaprompt_id" value="{{ mp.pk }}" class="mt-0.5 text-brand-600">
                        <div class="min-w-0">
                            <p class="text-sm font-medium text-gray-900 truncate">{{ mp.title }}</p>
                            {% if mp.project %}
                            <p class="text-xs text-orange-500 mt-0.5">Currently in: {{ mp.project.title }}</p>
                            {% elif mp.description %}
                            <p class="text-xs text-gray-500 line-clamp-1 mt-0.5">{{ mp.description }}</p>
                            {% endif %}
                        </div>
                    </label>
                    {% endfor %}
                </div>
                <button type="submit"
                    class="w-full bg-gray-900 text-white py-2.5 rounded-lg hover:bg-gray-800 font-medium text-sm transition">
                    Add Selected
                </button>
            </form>
        </div>
        {% else %}
        <div class="border-t pt-5">
            <p class="text-sm text-gray-400 text-center py-2">All your metaprompts are already in this project.</p>
        </div>
        {% endif %}
    </div>
</div>
