<div class="bg-{% if type == 'error' %}red{% elif type == 'success' %}green{% else %}blue{% endif %}-100 text-{% if type == 'error' %}red{% elif type == 'success' %}green{% else %}blue{% endif %}-800 px-4 py-3 rounded-lg shadow-lg text-sm animate-pulse"
    x-data x-init="setTimeout(() => $el.remove(), 3000)">
    {{ message }}
</div>
